{{define "content"}}
<div>
  <h1 class="text-2xl font-bold text-white mb-6">Timeline</h1>
  <div class="space-y-4" data-search-list>
    <input type="text" placeholder="Filter..." class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500 mb-4" data-search-input>
    {{range .Page.Envelope.timeline_entries}}
    <div class="flex gap-4 items-start" data-search-item>
      <div class="text-xs text-gray-500 font-mono w-24 shrink-0 pt-1">{{.date}}</div>
      <div class="flex-1 p-3 rounded-lg bg-gray-900 border border-gray-800">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs font-mono text-gray-500">ADR-{{.number}}</span>
          <span class="px-1.5 py-0.5 rounded text-xs font-semibold
            {{if eq .status "accepted"}}bg-green-900 text-green-300
            {{else if eq .status "tbd"}}bg-yellow-900 text-yellow-300
            {{else if eq .status "proposed"}}bg-blue-900 text-blue-300
            {{else if eq .status "deprecated"}}bg-red-900 text-red-300
            {{else if eq .status "superseded"}}bg-gray-700 text-gray-300
            {{end}}">{{.status}}</span>
        </div>
        <a href="{{.url}}" class="text-white hover:text-blue-400 transition-colors">{{.title}}</a>
        {{if .supersedes}}
        <div class="text-xs text-gray-500 mt-1">
          Supersedes: {{range $i, $n := .supersedes}}{{if $i}}, {{end}}ADR-{{$n}}{{end}}
        </div>
        {{end}}
      </div>
    </div>
    {{end}}
  </div>
</div>
{{end}}
