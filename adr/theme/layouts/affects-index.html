{{define "content"}}
<div>
  <h1 class="text-2xl font-bold text-white mb-6">Affected Files</h1>
  <input type="text" placeholder="Search paths..." class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500 mb-4" data-search-input>
  <div class="space-y-3" data-search-list>
    {{range .Page.Envelope.affects_entries}}
    <div class="p-3 rounded-lg bg-gray-900 border border-gray-800" data-search-item>
      <div class="font-mono text-sm mb-2 {{if .exists}}text-gray-200{{else}}text-red-400 line-through{{end}}">
        {{if .repo_link}}<a href="{{.repo_link}}" class="hover:text-blue-400 transition-colors" target="_blank" rel="noopener">{{.pattern}}</a>
        {{else}}{{.pattern}}{{end}}
        {{if .match_count}}<span class="text-gray-500 text-xs ml-2">({{.match_count}} files)</span>{{end}}
      </div>
      <div class="flex flex-wrap gap-2">
        {{range .adrs}}
        <a href="{{slice .url 1}}" class="text-xs px-2 py-0.5 bg-gray-800 text-gray-300 rounded hover:bg-gray-700 transition-colors">
          ADR-{{.number}} {{.title}}
        </a>
        {{end}}
      </div>
    </div>
    {{end}}
  </div>
</div>
{{end}}
