<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Page.Envelope.title}} — {{.Site.Name}}</title>
  <base href="{{.Site.BaseURL}}/">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <nav class="border-b border-gray-800 px-6 py-4">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <a href="." class="text-lg font-bold text-white hover:text-blue-400 transition-colors">{{.Site.Name}}</a>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="." class="hover:text-white transition-colors">Home</a>
        <a href="timeline" class="hover:text-white transition-colors">Timeline</a>
        <a href="tags" class="hover:text-white transition-colors">Tags</a>
        <a href="affects" class="hover:text-white transition-colors">Affected Files</a>
      </div>
    </div>
  </nav>
  <main class="max-w-4xl mx-auto px-6 py-8">
    {{template "content" .}}
  </main>
  <script type="application/json" id="fuego-data">{{.JSON}}</script>
  <script src="app.js"></script>
</body>
</html>
{{define "content"}}{{.Page.Content}}{{end}}
